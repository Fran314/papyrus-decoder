<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Papyrus decoder</title>
        <style>
            body {
                margin: 0;
                background: #111;
                overflow: hidden;
            }
            #scene {
                display: block;
                width: 100vw;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <canvas id="scene"></canvas>
        <script>
            const SCENES = {
                'papyrus-1': {
                    papyrus: 'papiro.png',
                    icons: [
                        { name: 'girino.png', cx: 500, cy: 250, h: 170 },
                        { name: 'fiore.png', cx: 270, cy: 470, h: 230 },
                        { name: 'dito.png', cx: 520, cy: 500, h: 230 },
                        {
                            name: 'corda_arrotolata.png',
                            cx: 760,
                            cy: 470,
                            h: 190,
                        },
                    ],
                },
                'papyrus-2': {
                    papyrus: 'papiro.png',
                    icons: [
                        { name: 'bastoncino.png', cx: 350, cy: 400, h: 300 },
                        { name: 'corda_piegata.png', cx: 650, cy: 400, h: 280 },
                    ],
                },
            }

            const SCAN = 3.0 // keep in sync with SWEEP_DURATION in leds.py
            const HOLD = 1.5
            const TRANSITION = 1.0
            const MARGIN_LEFT = 60
            const LARGE_FRACTION = 0.9
            const SMALL_FACTOR = 0.8

            const canvas = document.getElementById('scene')
            const ctx = canvas.getContext('2d')
            const images = {}

            let current = null
            let startTime = 0
            let width = 0
            let height = 0

            const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v))
            const lerp = (a, b, t) => a + (b - a) * t
            const smoothstep = t => t * t * (3 - 2 * t)

            function resize() {
                const dpr = window.devicePixelRatio || 1
                width = window.innerWidth
                height = window.innerHeight
                canvas.width = width * dpr
                canvas.height = height * dpr
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
            }

            // 0 = large and centered, 1 = small and left-aligned
            function placementProgress(t) {
                if (t <= SCAN + HOLD) return 0
                return smoothstep(clamp((t - SCAN - HOLD) / TRANSITION, 0, 1))
            }

            function drawScene(scene, t) {
                const papyrus = images[scene.papyrus]
                const nw = papyrus.naturalWidth
                const nh = papyrus.naturalHeight

                const scaleLarge = (LARGE_FRACTION * height) / nh
                const scaleSmall = scaleLarge * SMALL_FACTOR
                const p = placementProgress(t)
                const scale = lerp(scaleLarge, scaleSmall, p)

                const xLarge = (width - nw * scaleLarge) / 2
                const yLarge = (height - nh * scaleLarge) / 2
                const xSmall = MARGIN_LEFT
                const ySmall = (height - nh * scaleSmall) / 2
                const x = lerp(xLarge, xSmall, p)
                const y = lerp(yLarge, ySmall, p)

                const reveal = clamp(t / SCAN, 0, 1)
                ctx.save()
                if (reveal < 1) {
                    ctx.beginPath()
                    ctx.rect(x, 0, nw * scale * reveal, height)
                    ctx.clip()
                }

                ctx.drawImage(papyrus, x, y, nw * scale, nh * scale)

                // icons are authored in papyrus-native coords, so they ride the
                // same scale and offset as the papyrus
                for (const icon of scene.icons) {
                    const image = images[icon.name]
                    const ih = icon.h * scale
                    const iw = ih * (image.naturalWidth / image.naturalHeight)
                    const cx = x + icon.cx * scale
                    const cy = y + icon.cy * scale
                    ctx.drawImage(image, cx - iw / 2, cy - ih / 2, iw, ih)
                }

                ctx.restore()

                if (reveal < 1) {
                    const bx = x + nw * scale * reveal
                    ctx.save()
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.9)'
                    ctx.shadowBlur = 24
                    ctx.fillStyle = '#fff'
                    ctx.fillRect(bx - 6, 0, 12, height)
                    ctx.restore()
                }
            }

            function frame(now) {
                ctx.clearRect(0, 0, width, height)
                if (current) drawScene(current, (now - startTime) / 1000)
                requestAnimationFrame(frame)
            }

            // preload all the assets at the beginning so that they don't fade
            // in progressively on first appearence
            async function preloadAll() {
                const res = await fetch('/assets')
                const urls = await res.json()
                await Promise.all(
                    urls.map(async url => {
                        const image = new Image()
                        image.src = url
                        await image.decode().catch(() => {})
                        images[url.split('/').pop()] = image
                    }),
                )
            }

            async function poll() {
                try {
                    const res = await fetch('/tag')
                    const data = await res.json()
                    if (data.scene && SCENES[data.scene]) {
                        current = SCENES[data.scene]
                        startTime = performance.now()
                    }
                } catch (e) {}
                setTimeout(poll, 400)
            }

            function reset() {
                return fetch('/reset', { method: 'POST' }).catch(() => {})
            }

            window.addEventListener('resize', resize)
            resize()
            reset()
                .then(preloadAll)
                .finally(() => {
                    requestAnimationFrame(frame)
                    poll()
                })
        </script>
    </body>
</html>
