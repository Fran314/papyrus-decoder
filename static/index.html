<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Papyrus decoder</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #111;
                overflow: hidden;
            }
            #scene {
                max-width: 100vw;
                max-height: 100vh;
                object-fit: contain;
            }
        </style>
    </head>
    <body>
        <img id="scene" alt="" />
        <script>
            const SCENES = {
                'papyrus-1': '/static/assets/papiro.png',
                'papyrus-2': '/static/assets/girino.png',
            }

            const img = document.getElementById('scene')

            // preload all the assets at the beginning so that they don't fade
            // in progressively on first appearence
            async function preloadAll() {
                const res = await fetch('/assets')
                const urls = await res.json()
                await Promise.all(
                    urls.map(url => {
                        const image = new Image()
                        image.src = url
                        return image.decode().catch(() => {})
                    }),
                )
            }

            async function poll() {
                try {
                    const res = await fetch('/tag')
                    const data = await res.json()
                    if (data.scene && SCENES[data.scene]) {
                        img.src = SCENES[data.scene]
                    }
                } catch (e) {}
                setTimeout(poll, 400)
            }

            preloadAll().finally(poll)
        </script>
    </body>
</html>
